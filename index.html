<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Keuangan Suami Istri</title>
    <!-- Memuat Library D3.js untuk Grafik -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- MEMUAT FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* CSS Styles untuk Satu Layar */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .mobile-container { background-color: #ffffff; width: 100%; max-width: 400px; height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        .header { background: linear-gradient(135deg, #4caf50, #2e7d32); color: white; padding: 12px 15px; text-align: center; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; z-index: 10;}
        
        /* Baris Atas: Menu Kiri & Status Kanan */
        .header-top { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; position: relative;}
        
        /* Dropdown Menu Style */
        .menu-container { position: relative; }
        #menuBtn { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 12px; font-weight: bold; cursor: pointer; padding: 5px 10px; border-radius: 6px; transition: 0.2s;}
        #menuBtn:active { background: rgba(255,255,255,0.4); }
        .dropdown-content { display: none; position: absolute; left: 0; top: 110%; background-color: #ffffff; min-width: 130px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; z-index: 20; }
        .dropdown-content.show { display: block; }
        .dropdown-content a { color: #333; padding: 10px 12px; text-decoration: none; display: block; font-size: 13px; text-align: left; border-bottom: 1px solid #eee;}
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background-color: #f9f9f9; }
        .dropdown-content a.active { background-color: #e8f5e9; color: #2e7d32; font-weight: bold; }

        #statusKoneksi { font-size: 10px; padding: 4px 10px; border-radius: 12px; font-weight: bold; transition: 0.3s; }

        .header h2 { margin: 0; font-size: 12px; font-weight: normal; opacity: 0.9;}
        .header h1 { margin: 5px 0 10px 0; font-size: 24px; }
        .wallet-split { display: flex; justify-content: space-between; background: rgba(255,255,255,0.2); padding: 6px; border-radius: 8px; width: 100%; box-sizing: border-box;}
        .wallet-item { flex: 1; text-align: center; }
        .wallet-item:first-child { border-right: 1px solid rgba(255,255,255,0.3); }
        .wallet-item span { display: block; font-size: 11px; }
        .wallet-item strong { font-size: 14px; }
        
        /* Area Konten Diperluas karena Navigasi Bawah Hilang */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 12px 15px; }
        .view-section { display: none; flex-direction: column; height: 100%; }
        .view-section.active { display: flex; }

        .type-toggle { display: flex; margin-bottom: 10px; border-radius: 6px; overflow: hidden; border: 1px solid #4caf50; flex-shrink: 0; }
        .type-toggle button { flex: 1; padding: 6px; border: none; background: white; color: #4caf50; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .type-toggle button.active { background: #4caf50; color: white; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
        .form-group label { display: block; margin-bottom: 3px; font-size: 11px; font-weight: bold; color: #555;}
        .form-group input, .form-group select { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 12px; }
        .form-full { grid-column: span 2; display: flex; gap: 8px; flex-shrink: 0;}
        .form-full .desc { flex: 2; }
        .form-full .btn { flex: 1; }
        
        .btn-submit { background-color: #ff9800; color: white; padding: 6px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; width: 100%; height: 100%; }
        .btn-submit:active { background-color: #e68a00; } 
        
        .history { display: flex; flex-direction: column; flex: 1; overflow: hidden; margin-top: 5px; min-height: 0; }
        .history h3 { font-size: 13px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 5px; margin: 0 0 5px 0; flex-shrink: 0;}
        #transactionList { flex: 1; overflow-y: auto; padding-right: 5px; } 
        
        .transaction { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .t-info { display: flex; flex-direction: column; }
        .t-title { font-weight: bold; font-size: 12px; color: #333; }
        .t-meta { font-size: 10px; color: #777; margin-top: 2px; }
        .badge { padding: 2px 4px; border-radius: 4px; font-size: 9px; margin-right: 4px; }
        .badge-suami { background-color: #e3f2fd; color: #1976d2; }
        .badge-istri { background-color: #fce4ec; color: #c2185b; }
        .badge-cat { background-color: #eee; color: #555; }
        .t-amount.in { color: #2e7d32; font-weight: bold; font-size: 12px;}
        .t-amount.out { color: #d32f2f; font-weight: bold; font-size: 12px;}

        .filter-group { display: flex; justify-content: space-between; margin-bottom: 15px; flex-shrink: 0;}
        .filter-group button { flex: 1; margin: 0 4px; padding: 6px; border: 1px solid #ddd; background: white; border-radius: 15px; font-size: 11px; cursor: pointer; }
        .filter-group button.active { background: #4caf50; color: white; border-color: #4caf50; }
        #chart-container { flex: 1; display: flex; justify-content: center; align-items: center; min-height: 150px;}
        .btn-export { background-color: #2196f3; color: white; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 10px; flex-shrink: 0;}
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="header">
        <div class="header-top">
            <!-- Dropdown Menu Kiri Atas -->
            <div class="menu-container">
                <button id="menuBtn" onclick="toggleMenu()">☰ Menu</button>
                <div id="dropdownMenu" class="dropdown-content">
                    <a href="#" id="menu-home" class="active" onclick="switchMenu('home')">🏠 Beranda</a>
                    <a href="#" id="menu-report" onclick="switchMenu('report')">📊 Laporan</a>
                </div>
            </div>
            <!-- Status Koneksi Kanan Atas -->
            <span id="statusKoneksi" style="background-color: #e0e0e0; color: #333;">Memuat...</span>
        </div>
        <h2>Total Saldo Keluarga</h2>
        <h1 id="totalBalance">Rp 0</h1>
        <div class="wallet-split">
            <div class="wallet-item"><span>Suami</span><strong id="suamiBalance">Rp 0</strong></div>
            <div class="wallet-item"><span>Istri</span><strong id="istriBalance">Rp 0</strong></div>
        </div>
    </div>

    <div class="content">
        <div id="view-home" class="view-section active">
            <div class="type-toggle">
                <button id="btnTypeOut" class="active" onclick="setTransType('out')">Pengeluaran</button>
                <button id="btnTypeIn" onclick="setTransType('in')">Isi Saldo</button>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="inputDate">
                </div>
                <div class="form-group">
                    <label>Akun</label>
                    <select id="inputUser">
                        <option value="Suami">Suami</option>
                        <option value="Istri">Istri</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="inputCategory"></select>
                </div>
                <div class="form-group">
                    <label>Jumlah (Rp)</label>
                    <input type="number" id="inputAmount" placeholder="Contoh: 50000">
                </div>
            </div>
            
            <div class="form-full">
                <div class="form-group desc">
                    <input type="text" id="inputDesc" placeholder="Keterangan: Cth. Sayur...">
                </div>
                <div class="form-group btn">
                    <button class="btn-submit" onclick="addTransaction()">Simpan</button>
                </div>
            </div>

            <div class="history">
                <h3>Riwayat</h3>
                <div id="transactionList"></div>
            </div>
        </div>

        <div id="view-report" class="view-section">
            <div class="filter-group">
                <button class="filter-btn" onclick="setFilter('harian')">Harian</button>
                <button class="filter-btn" onclick="setFilter('mingguan')">Mingguan</button>
                <button class="filter-btn active" onclick="setFilter('bulanan')">Bulanan</button>
            </div>
            <h4 style="text-align:center; color:#555; margin:0; font-size:12px;">Pengeluaran Kategori</h4>
            <div id="chart-container"></div>
            <button class="btn-export" onclick="exportToExcel()">📥 Ekspor Data ke Excel</button>
        </div>
    </div>
</div>

<script>
    // KODE KUNCI FIREBASE ANDA 
    const firebaseConfig = {
        apiKey: "AIzaSyAGRqX2Gp6vGb25jRjsWs_iK5yuGkr3hWE",
        authDomain: "keuangan-keluarga-8a9ee.firebaseapp.com",
        projectId: "keuangan-keluarga-8a9ee",
        storageBucket: "keuangan-keluarga-8a9ee.firebasestorage.app",
        messagingSenderId: "345297536532",
        appId: "1:345297536532:web:cd1729a80abe0078a3c901",
        measurementId: "G-SH5JM3YMZ1"
    };

    let db = null;
    let isCloudReady = false;
    
    // SELALU TARIK DATA DARI MEMORI HP DULU AGAR CEPAT
    let transactions = JSON.parse(localStorage.getItem('data_keuangan_lokal')) || [];
    let currentType = 'out';
    let currentFilter = 'bulanan';

    const categories = {
        out: ["Makanan", "Belanja Harian", "Tagihan", "Transport", "Hiburan", "Kesehatan", "Lainnya"],
        in: ["Gaji", "Bonus", "Hasil Usaha", "Pemberian", "Lainnya"]
    };

    // PENGATURAN AWAL LAYAR
    document.getElementById('inputDate').valueAsDate = new Date();
    updateCategoryOptions();
    updateUI(); 

    // LOGIKA DROPDOWN MENU
    function toggleMenu() {
        document.getElementById("dropdownMenu").classList.toggle("show");
    }

    // Menutup dropdown jika user klik area kosong di layar
    window.onclick = function(event) {
        if (!event.target.matches('#menuBtn')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) {
                    dropdowns[i].classList.remove('show');
                }
            }
        }
    }

    // FUNGSI BERPINDAH HALAMAN
    function switchMenu(view) {
        document.getElementById('view-home').classList.remove('active');
        document.getElementById('view-report').classList.remove('active');
        document.getElementById('menu-home').classList.remove('active');
        document.getElementById('menu-report').classList.remove('active');
        
        document.getElementById('view-' + view).classList.add('active');
        document.getElementById('menu-' + view).classList.add('active');
        
        // Tutup dropdown setelah ditekan
        document.getElementById("dropdownMenu").classList.remove("show");

        if(view === 'report') renderChart();
    }

    // MENCOBA MENGHUBUNGKAN KE FIREBASE (DI LATAR BELAKANG)
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();

        db.ref('.info/connected').on('value', function(snap) {
            if (snap.val() === true) {
                isCloudReady = true;
                setIndikator('🟢 Cloud Tersambung', '#d4edda', '#155724');
            } else {
                isCloudReady = false;
                setIndikator('🟡 Offline (Simpan di HP)', '#fff3cd', '#856404');
            }
        });

        db.ref('transaksi_keuangan').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                let cloudData = [];
                for (let id in data) {
                    cloudData.push({ firebaseId: id, ...data[id] });
                }
                transactions = cloudData;
                updateUI();
                localStorage.setItem('data_keuangan_lokal', JSON.stringify(transactions));
            }
        });
    } catch(e) {
        setIndikator('🔴 Mode Lokal', '#f8d7da', '#721c24');
    }

    function setIndikator(teks, warnaBg, warnaTeks) {
        const el = document.getElementById('statusKoneksi');
        el.innerText = teks;
        el.style.backgroundColor = warnaBg;
        el.style.color = warnaTeks;
    }

    // FUNGSI-FUNGSI TRANSAKSI
    function setTransType(type) {
        currentType = type;
        document.getElementById('btnTypeOut').classList.toggle('active', type === 'out');
        document.getElementById('btnTypeIn').classList.toggle('active', type === 'in');
        updateCategoryOptions();
    }

    function updateCategoryOptions() {
        const select = document.getElementById('inputCategory');
        select.innerHTML = '';
        categories[currentType].forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.innerText = cat;
            select.appendChild(opt);
        });
    }

    // FUNGSI SIMPAN ANTI-MACET
    function addTransaction() {
        const date = document.getElementById('inputDate').value;
        const user = document.getElementById('inputUser').value;
        const category = document.getElementById('inputCategory').value;
        const desc = document.getElementById('inputDesc').value;
        const amount = parseInt(document.getElementById('inputAmount').value);

        if(!date || !desc || isNaN(amount) || amount <= 0) {
            alert("Harap isi keterangan dan jumlah (Rp)!"); return;
        }

        const trx = { id: Date.now(), timestamp: Date.now(), type: currentType, date, user, category, desc, amount };

        transactions.push(trx);
        localStorage.setItem('data_keuangan_lokal', JSON.stringify(transactions));
        
        document.getElementById('inputDesc').value = '';
        document.getElementById('inputAmount').value = '';
        
        updateUI();

        if (db && isCloudReady) {
            db.ref('transaksi_keuangan').push(trx).catch(err => {
                console.log("Firebase belum siap, data tetap tersimpan di HP.");
            });
        }
    }

    function updateUI() {
        let balSuami = 0; let balIstri = 0;
        const list = document.getElementById('transactionList');
        list.innerHTML = '';

        const sortedTrx = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date) || b.timestamp - a.timestamp);

        sortedTrx.forEach(t => {
            if(t.user === 'Suami') balSuami += (t.type === 'in' ? t.amount : -t.amount);
            if(t.user === 'Istri') balIstri += (t.type === 'in' ? t.amount : -t.amount);

            const div = document.createElement('div');
            div.className = 'transaction';
            const badgeUser = t.user === 'Suami' ? 'badge-suami' : 'badge-istri';
            const amountClass = t.type === 'in' ? 'in' : 'out';
            const amountPrefix = t.type === 'in' ? '+ Rp' : '- Rp';

            div.innerHTML = `
                <div class="t-info">
                    <span class="t-title">${t.desc}</span>
                    <div class="t-meta">
                        <span class="badge ${badgeUser}">${t.user}</span>
                        <span class="badge badge-cat">${t.category}</span>
                        <span>${t.date.slice(5)}</span>
                    </div>
                </div>
                <div class="t-amount ${amountClass}">${amountPrefix} ${t.amount.toLocaleString('id-ID')}</div>
            `;
            list.appendChild(div);
        });

        document.getElementById('totalBalance').innerText = 'Rp ' + (balSuami + balIstri).toLocaleString('id-ID');
        document.getElementById('suamiBalance').innerText = 'Rp ' + balSuami.toLocaleString('id-ID');
        document.getElementById('istriBalance').innerText = 'Rp ' + balIstri.toLocaleString('id-ID');
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderChart();
    }

    function renderChart() {
        const container = document.getElementById('chart-container');
        container.innerHTML = ''; 
        const now = new Date();
        const filteredData = transactions.filter(t => {
            if(t.type !== 'out') return false; 
            const tDate = new Date(t.date);
            if(currentFilter === 'harian') return tDate.toDateString() === now.toDateString();
            else if (currentFilter === 'mingguan') return Math.ceil(Math.abs(now - tDate) / (1000 * 60 * 60 * 24)) <= 7;
            else return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
        });

        if(filteredData.length === 0) {
            container.innerHTML = '<p style="color:#999; font-size:12px;">Belum ada pengeluaran.</p>'; return;
        }

        const dataMap = d3.rollup(filteredData, v => d3.sum(v, d => d.amount), d => d.category);
        const data = Array.from(dataMap, ([name, value]) => ({name, value}));

        const width = 200, height = 150, margin = 10;
        const radius = Math.min(width, height) / 2 - margin;
        const svg = d3.select("#chart-container").append("svg").attr("width", width).attr("height", height).append("g").attr("transform", `translate(${width/2},${height/2})`);
        const color = d3.scaleOrdinal().domain(data.map(d => d.name)).range(["#f44336", "#e91e63", "#9c27b0", "#673ab7", "#3f51b5", "#2196f3", "#ff9800"]);
        const pie = d3.pie().value(d => d.value);
        const arc = d3.arc().innerRadius(radius * 0.4).outerRadius(radius);

        svg.selectAll('allSlices').data(pie(data)).join('path').attr('d', arc).attr('fill', d => color(d.data.name)).attr("stroke", "white").style("stroke-width", "2px");

        const arcLabel = d3.arc().innerRadius(radius * 0.7).outerRadius(radius * 0.7);
        svg.selectAll('allLabels').data(pie(data)).join('text').text(d => d.data.name).attr("transform", d => `translate(${arcLabel.centroid(d)})`).style("text-anchor", "middle").style("font-size", "9px").style("fill", "#fff").style("font-weight", "bold");
    }

    function exportToExcel() {
        if(transactions.length === 0) { alert("Tidak ada data!"); return; }
        let csvContent = "data:text/csv;charset=utf-8,Tanggal,Tipe,Akun,Kategori,Keterangan,Jumlah\r\n"; 
        transactions.forEach(t => csvContent += `${t.date},${t.type==='in'?'Pemasukan':'Pengeluaran'},${t.user},${t.category},${t.desc},${t.amount}\r\n`);
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", "Keuangan_Pasangan.csv");
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
</script>
</body>
</html>
